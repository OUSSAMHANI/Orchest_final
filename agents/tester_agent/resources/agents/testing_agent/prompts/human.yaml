verbose: |
  ACTION: Architect and implement a comprehensive test suite for the following ticket.
  TICKET: {ticket_text}
  TECHNICAL SPECIFICATION: {spec_text}

  Workspace root is the current directory.
  All file paths must be strictly relative to it.
  Existing implementation files:
  {file_list_str}
  
  DETECTED LANGUAGE  : {detected_language}
  DETECTED FRAMEWORK : {detected_framework}

  AVAILABLE TOOLS:
  {tool_catalogue}

  WORKFLOW:
   1. Read relevant implementation files using 'read_file' to understand logic branches.
   2. Write modular test files inside the 'tests/' directory using 'write_file'.
   3. Write the '.gitignore' file to exclude test artifacts.
   4. Write the 'script.sh' lifecycle script (Install -> Execute -> Teardown).
   5. Run the suite using the appropriate tool from the catalogue.
   6. If tests fail due to test logic errors, fix them; if they fail due to bugs in implementation, report them.

  NEGATIVE RULES (CRITICAL):
  - DO NOT modify any existing source code files. You are an observer and validator only.
  - DO NOT create empty or placeholder test files. Every 'write_file' call must contain complete, functional assertions.
  - DO NOT use 'write_file' for any path outside of 'tests/', 'script.sh', or '.gitignore'.
  - DO NOT skip the "Teardown" section in 'script.sh'. The environment must be left pristine.

compact: |
  Architect a test suite for: {ticket_text}
  Spec: {spec_text}
  Files: {file_list_str}
  Language: {detected_language} | Framework: {detected_framework}
  Steps: read implementation → write modular tests in 'tests/' → write .gitignore → write script.sh (with Teardown) → execute.