services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - agent-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - agent-net

  orchestrator-api:
    build: .
    container_name: orchestrator-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - workspaces:/workspaces
    env_file:
      - .env
    environment:
      KAFKA_BROKERS: kafka:9092
      SPEC_AGENT_URL: http://spec-agent:8001
      CODER_AGENT_URL: http://coder-agent:8002
      TESTER_AGENT_URL: http://tester-agent:8003
      # REVIEWER_AGENT_URL: http://reviewer-agent:8004
    command: >
      uvicorn orchestrator.main:app
      --host 0.0.0.0
      --port 8000
    depends_on:
      - kafka
    networks:
      - agent-net
    restart: unless-stopped

  spec-agent:

    build:
      context: .
      dockerfile: ./agents/spec_agent/Dockerfile
    container_name: spec-agent
    ports:
      - "8001:8001"
    env_file:
      - .env
    # command: >
    #   uvicorn main:app --host 0.0.0.0 --port 8001
    depends_on:
      - kafka
    networks:
      - agent-net

  coder-agent:
    build:
      context: .
      dockerfile: ./agents/coder_agent/Dockerfile
    container_name: coder-agent
    ports:
      - "8002:8002"
    env_file:
      - .env
    # command: >
    #     uvicorn main:app --host 0.0.0.0 --port 8002
    depends_on:
      - kafka
    networks:
      - agent-net

  tester-agent:
    build:
      context: .
      dockerfile: ./agents/tester_agent/Dockerfile
    container_name: tester-agent
    ports:
      - "8003:8003"
    env_file:
      - .env
    # command: >
    #   uvicorn main:app --host 0.0.0.0 --port 8003
    #   --host 0.0.0.0
    #   --port 8003
    depends_on:
      - kafka
    networks:
      - agent-net

  # reviewer-agent:
  #   build: .
  #   container_name: reviewer-agent
  #   ports:
  #     - "8004:8004"
  #   env_file:
  #     - .env
  #   command: >
  #     uvicorn agents.reviewer_agent.main:app
  #     --host 0.0.0.0
  #     --port 8004
  #   depends_on:
  #     - kafka
  #   networks:
  #     - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  workspaces: