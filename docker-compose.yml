services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - agent-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - agent-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [kafka]
    restart: on-failure
    volumes:
      - ./ingestion_layer/infra/kafka/topics.sh:/topics.sh
    entrypoint: ["/bin/bash", "/topics.sh"]
    networks:
      - agent-net
  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - agent-net

  webhook:
    build:
      context: /ingestion_layer/services/webhook_listener
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    env_file: /ingestion_layer/.env
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

  consumer:
    build:
      context: /ingestion_layer/services/consumer
      dockerfile: Dockerfile
    env_file: .env
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - agent-net
    environment:
      ORCHESTRATOR_URL: http://orchestrator-api:8000/ticket/sync

  repo-syncer:
    build:
      context: /ingestion_layer/services/repo_syncer
      dockerfile: Dockerfile
    env_file: .env
    environment:
      REPO_WORKDIR: /workspaces
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    volumes:
      - ./.workspace:/workspaces 
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - agent-net
  orchestrator-api:
    build:
      context: .
      dockerfile: ./orchestrator/Dockerfile
    container_name: orchestrator-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - workspaces:/workspaces
    env_file:
      - .env
    environment:
      KAFKA_BROKERS: kafka:9092
      SPEC_AGENT_URL: http://spec-agent:8001
      CODER_AGENT_URL: http://coder-agent:8002
      TESTER_AGENT_URL: http://tester-agent:8003
      # REVIEWER_AGENT_URL: http://reviewer-agent:8004
    command: >
      uvicorn orchestrator.main:app
      --host 0.0.0.0
      --port 8000
    depends_on:
      - kafka
    networks:
      - agent-net
    restart: unless-stopped

  spec-agent:
    build:
      context: .
      dockerfile: ./agents/spec_agent/Dockerfile
    container_name: spec-agent
    ports:
      - "8001:8001"
    volumes:
      - ./agents/spec_agent/logs:/app/agents/spec_agent/logs
      - workspaces:/workspaces
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - agent-net

  coder-agent:
    build:
      context: .
      dockerfile: ./agents/coder_agent/Dockerfile
    container_name: coder-agent
    ports:
      - "8002:8002"
    volumes:
      - ./agents/coder_agent/logs:/app/agents/coder_agent/logs
      - workspaces:/workspaces
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - agent-net

  tester-agent:
    build:
      context: .
      dockerfile: ./agents/tester_agent/Dockerfile
    container_name: tester-agent
    ports:
      - "8003:8003"
    volumes:
      - ./agents/tester_agent/logs:/app/agents/tester_agent/logs
      - workspaces:/workspaces
    env_file:
      - .env
    depends_on:
      - kafka
    networks:
      - agent-net

  # reviewer-agent:
  #   build: .
  #   container_name: reviewer-agent
  #   ports:
  #     - "8004:8004"
  #   env_file:
  #     - .env
  #   command: >
  #     uvicorn agents.reviewer_agent.main:app
  #     --host 0.0.0.0
  #     --port 8004
  #   depends_on:
  #     - kafka
  #   networks:
  #     - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  workspaces: